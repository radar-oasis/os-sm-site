# DNS rollback origin for the public media hostname.
# Production normally points media.84000.art at Tencent Cloud CDN. During a
# rollback, DNS can point the same hostname to 1.13.184.65 without changing the
# application.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name media.84000.art;

    ssl_certificate     /etc/nginx/ssl/84000.art/84000.art_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/84000.art/84000.art.key;

    access_log /var/log/nginx/os-sm-media.access.log;
    error_log  /var/log/nginx/os-sm-media.error.log;

    location ^~ /йҡҸиә«еҜәеәҷзҹӯи§Ҷйў‘30з§’/ {
        root /var/www/os-sm;
        try_files $uri =404;

        add_header Access-Control-Allow-Origin "https://os-sm.84000.art" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Access-Control-Expose-Headers "Accept-Ranges, Content-Length, Content-Range, ETag" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location / {
        return 404;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name media.84000.art;
    return 301 https://media.84000.art$request_uri;
}
