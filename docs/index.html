<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>隨身寺廟 · 非遺工藝譜系（iPad）</title>

<!-- Viewport: iPad-first, no zoom -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<!-- iOS PWA chrome -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="隨身寺廟">
<meta name="mobile-web-app-capable" content="yes">

<meta http-equiv="Expires" content="0">

<!-- Manifest + icons -->
<script>
  window.__APP_BUILD_VERSION__ = 'v14';
  window.__IS_LOCAL_PREVIEW__ = ['', 'localhost', '127.0.0.1', '::1'].includes(location.hostname);
  window.__APP_ASSET_VERSION__ = window.__IS_LOCAL_PREVIEW__ ? `dev-${Date.now()}` : window.__APP_BUILD_VERSION__;
  window.__APP_MEDIA_BASE_URL__ = window.__IS_LOCAL_PREVIEW__ ? '' : 'https://media.84000.art';
  window.makeVersionedAssetUrl = (src) => {
    const separator = src.includes('?') ? '&' : '?';
    return `${src}${separator}v=${encodeURIComponent(window.__APP_ASSET_VERSION__)}`;
  };
  window.makeMediaAssetUrl = (src) => {
    if (!src) return '';
    if (/^(https?:)?\/\//.test(src) || src.startsWith('data:') || src.startsWith('blob:')) return src;
    const encodedPath = src.split('/').map(encodeURIComponent).join('/');
    const mediaBase = String(window.__APP_MEDIA_BASE_URL__ || '').replace(/\/+$/, '');
    return mediaBase ? `${mediaBase}/${encodedPath}` : encodedPath;
  };
  window.makeVersionedAssetTag = (src, type) => {
    const typeAttr = type ? ` type="${type}"` : '';
    return `<script${typeAttr} src="${window.makeVersionedAssetUrl(src)}"><\/script>`;
  };
  document.write(`<link rel="manifest" href="${window.makeVersionedAssetUrl('manifest.webmanifest')}">`);
</script>
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#0a0806; --ink-2:#161210; --ink-3:#221b16;
    --paper:#f4ead7; --paper-2:#e8dcc2; --paper-3:#c9b791;
    --vermilion:#b8331f; --vermilion-deep:#7a1d10;
    --rust:#c2541b; --gold:#c9a24a; --gold-bright:#e8c773; --gold-deep:#8a6d2a;
    --jade:#4a8a7a; --jade-deep:#2c5448; --coral:#c8492f; --bone:#d6c9a8;
    --line: rgba(201,162,74,.18); --line-strong: rgba(201,162,74,.42); --line-bone: rgba(214,201,168,.14);
    --serif:'Noto Serif SC','Songti SC',serif;
    --sans:'Noto Sans SC',system-ui,sans-serif;
    --display:'Cormorant Garamond','Noto Serif SC',serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent;}
  html, body{
    background: var(--ink);
    color: var(--paper);
    font-family: var(--serif);
    -webkit-font-smoothing: antialiased;
    overflow:hidden;
    height:100vh; width:100vw;
    user-select:none;
    -webkit-user-select:none;
    overscroll-behavior:none;
    touch-action: manipulation;
  }
  body{
    background:
      radial-gradient(ellipse 70% 40% at 50% -10%, rgba(232,199,115,.06), transparent 55%),
      radial-gradient(ellipse 50% 50% at 18% 80%, rgba(184,51,31,.08), transparent 60%),
      radial-gradient(ellipse 50% 60% at 88% 22%, rgba(74,138,122,.05), transparent 65%),
      linear-gradient(180deg, #0a0806 0%, #140f0a 100%);
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:1;
    background-image: radial-gradient(rgba(201,162,74,.04) 1px, transparent 1px);
    background-size: 3px 3px; opacity:.7;
  }
  ::selection{ background: var(--gold); color: var(--ink); }
  ::-webkit-scrollbar{ width:6px; height:6px }
  ::-webkit-scrollbar-track{ background: transparent }
  ::-webkit-scrollbar-thumb{ background: rgba(201,162,74,.25); border-radius: 3px }
  #app{ position:relative; z-index:2; height:100vh; width:100vw; overflow:hidden }
  input, textarea{ user-select:text; -webkit-user-select:text }
  button { font-family: var(--serif); }
</style>
</head>
<body>
  <div id="app"></div>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
      <rect width="400" height="400" fill="#0a0806"/>
      <rect x="100" y="100" width="200" height="200" fill="#b8331f" stroke="#e8c773" stroke-width="4"/>
      <text x="200" y="250" text-anchor="middle" fill="#f4ead7" font-family="serif" font-size="120" font-weight="700">寺</text>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    const clearLocalPreviewCaches = () => {
      const hadServiceWorkerController = Boolean(navigator.serviceWorker && navigator.serviceWorker.controller);
      const tasks = [];
      if ('serviceWorker' in navigator) {
        tasks.push(navigator.serviceWorker.getRegistrations().then(registrations =>
          Promise.all(registrations.map(registration => registration.unregister()))
        ));
      }
      if ('caches' in window) {
        tasks.push(caches.keys().then(keys => Promise.all(keys.map(key => caches.delete(key)))));
      }
      return Promise.allSettled(tasks).then(() => {
        const reloadKey = '__suishen_local_cache_refreshed__';
        if (hadServiceWorkerController && !sessionStorage.getItem(reloadKey)) {
          sessionStorage.setItem(reloadKey, '1');
          location.reload();
        }
      });
    };
    if ('serviceWorker' in navigator) {
      if (window.__IS_LOCAL_PREVIEW__) {
        window.addEventListener('load', () => { clearLocalPreviewCaches().catch(()=>{}); });
      } else if (location.protocol === 'https:') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register(`sw.js?v=${encodeURIComponent(window.__APP_ASSET_VERSION__ || 'v14')}`).catch(()=>{});
        });
      }
    }
    const inIframe = window !== window.top;
    window.__IS_STANDALONE = !inIframe && (
      (window.navigator.standalone === true) ||
      window.matchMedia('(display-mode: standalone)').matches ||
      window.matchMedia('(display-mode: fullscreen)').matches
    );
    window.__IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream ||
      (navigator.userAgent.includes('Mac') && navigator.maxTouchPoints > 0);
    document.addEventListener('gesturestart', e=>e.preventDefault());
    document.addEventListener('dblclick', e=>e.preventDefault());
  </script>

  <!-- Data + shared atoms -->
  <script>
    document.write(makeVersionedAssetTag('app-data.js'));
    document.write(makeVersionedAssetTag('components/atoms.jsx', 'text/babel'));

    /* Legacy desktop views (works/materials/timeline/reference) */
    document.write(makeVersionedAssetTag('components/works.jsx', 'text/babel'));
    document.write(makeVersionedAssetTag('components/timeline.jsx', 'text/babel'));
    document.write(makeVersionedAssetTag('components/os-apps.jsx', 'text/babel'));

    /* iPad-native primitives + views */
    document.write(makeVersionedAssetTag('components/ipad/atoms.jsx', 'text/babel'));
    document.write(makeVersionedAssetTag('components/ipad/shell.jsx', 'text/babel'));
    document.write(makeVersionedAssetTag('components/ipad/atlas.jsx', 'text/babel'));
    document.write(makeVersionedAssetTag('components/ipad/genealogy.jsx', 'text/babel'));
    document.write(makeVersionedAssetTag('components/ipad/map.jsx', 'text/babel'));

    /* Install prompt + root */
    document.write(makeVersionedAssetTag('components/ipad-install-prompt.jsx', 'text/babel'));
    document.write(makeVersionedAssetTag('components/ipad/app.jsx', 'text/babel'));
  </script>
</body>
</html>
