<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>隨身寺廟 · 非遺工藝譜系智庫 · PRINT</title>
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script>
  window.__APP_BUILD_VERSION__ = 'v13';
  window.__IS_LOCAL_PREVIEW__ = ['', 'localhost', '127.0.0.1', '::1'].includes(location.hostname);
  window.__APP_ASSET_VERSION__ = window.__IS_LOCAL_PREVIEW__ ? `dev-${Date.now()}` : window.__APP_BUILD_VERSION__;
  window.makeVersionedAssetUrl = (src) => {
    const separator = src.includes('?') ? '&' : '?';
    return `${src}${separator}v=${encodeURIComponent(window.__APP_ASSET_VERSION__)}`;
  };
  window.makeVersionedAssetTag = (src, type) => {
    const typeAttr = type ? ` type="${type}"` : '';
    return `<script${typeAttr} src="${window.makeVersionedAssetUrl(src)}"><\/script>`;
  };
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0d0a08; --ink-2:#161210; --ink-3:#221b16;
    --paper:#f4ead7; --paper-2:#e8dcc2; --paper-3:#c9b791;
    --vermilion:#b8331f; --vermilion-deep:#7a1d10;
    --rust:#c2541b; --gold:#c9a24a; --gold-bright:#e8c773; --gold-deep:#8a6d2a;
    --jade:#4a8a7a; --jade-deep:#2c5448; --coral:#c8492f; --bone:#d6c9a8;
    --line:rgba(201,162,74,.18); --line-strong:rgba(201,162,74,.42); --line-bone:rgba(214,201,168,.14);
    --serif:'Noto Serif SC','Songti SC',serif;
    --sans:'Noto Sans SC',system-ui,sans-serif;
    --display:'Cormorant Garamond','Noto Serif SC',serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-print-color-adjust:exact; print-color-adjust:exact;}
  html,body{
    background:var(--ink); color:var(--paper);
    font-family:var(--serif); -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--gold); color:var(--ink);}

  /* PRINT PAGE LAYOUT */
  @page{
    size: A3 landscape;
    margin: 0;
  }
  .print-page{
    width: 420mm;
    min-height: 297mm;
    background:
      radial-gradient(ellipse 1200px 800px at 20% -10%, rgba(184,51,31,.10), transparent 60%),
      radial-gradient(ellipse 1000px 700px at 110% 110%, rgba(74,138,122,.07), transparent 55%),
      var(--ink);
    page-break-after: always;
    break-after: page;
    position: relative;
    overflow: hidden;
    padding: 0;
  }
  .print-page:last-child{ page-break-after: auto; }
  .print-page-header{
    display:flex; justify-content:space-between; align-items:center;
    padding: 14mm 16mm 8mm;
    border-bottom: 1px solid var(--line);
  }
  .print-page-body{
    padding: 8mm 16mm 16mm;
  }
  .print-cover{
    background:
      radial-gradient(ellipse at 50% 30%, rgba(184,51,31,.12), transparent 60%),
      radial-gradient(ellipse at 50% 80%, rgba(201,162,74,.08), transparent 65%),
      var(--ink);
  }

  /* Disable sticky positioning + scrolling for print */
  [style*="position:sticky"], [style*="position: sticky"]{
    position: static !important;
    top: auto !important;
  }
  [style*="overflow:auto"], [style*="overflow: auto"],
  [style*="overflow-y:auto"], [style*="overflow-x:auto"]{
    overflow: visible !important;
  }
  /* Header is hidden in print mode (we have our own page header) */
  header[style*="position:sticky"]{ display:none !important; }

  /* Avoid breaking inside cards */
  aside, section > div, .print-page-body > div{
    break-inside: avoid;
  }
  table, .matrix-row{ break-inside: avoid; }

  @media screen{
    body{ background: #2a2218; padding: 20px; }
    .print-page{ margin: 0 auto 20px; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
  }
</style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    document.write(makeVersionedAssetTag('app-data.js'));
    document.write(makeVersionedAssetTag('components/atoms.jsx', 'text/babel'));
    document.write(makeVersionedAssetTag('components/header.jsx', 'text/babel'));
    document.write(makeVersionedAssetTag('components/overview.jsx', 'text/babel'));
    document.write(makeVersionedAssetTag('components/heatmap.jsx', 'text/babel'));
    document.write(makeVersionedAssetTag('components/genealogy.jsx', 'text/babel'));
    document.write(makeVersionedAssetTag('components/works.jsx', 'text/babel'));
    document.write(makeVersionedAssetTag('components/timeline.jsx', 'text/babel'));
    document.write(makeVersionedAssetTag('components/app-print.jsx', 'text/babel'));
  </script>
</body>
</html>
