<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>os-sm.84000.art</title>
  <meta name="description" content="os-sm.84000.art GitHub Pages starter site">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f4ee;
      --ink: #1f2520;
      --muted: #667067;
      --line: #d8d0c3;
      --accent: #245f46;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }
    main {
      width: min(880px, 100%);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      padding: clamp(28px, 6vw, 64px);
    }
    .eyebrow {
      color: var(--accent);
      font-size: 13px;
      letter-spacing: 0;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 18px;
    }
    h1 {
      font-size: clamp(34px, 7vw, 72px);
      line-height: 0.98;
      letter-spacing: 0;
      margin: 0 0 22px;
      max-width: 760px;
    }
    p {
      color: var(--muted);
      font-size: clamp(16px, 2.2vw, 20px);
      line-height: 1.7;
      max-width: 720px;
      margin: 0 0 26px;
    }
    dl {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 12px 18px;
      margin: 34px 0 0;
      padding-top: 24px;
      border-top: 1px solid var(--line);
      font-size: 15px;
    }
    dt { color: var(--muted); }
    dd { margin: 0; font-weight: 650; overflow-wrap: anywhere; }
    @media (max-width: 560px) {
      dl { grid-template-columns: 1fr; gap: 4px; }
      dd { margin-bottom: 12px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">GitHub Pages starter</div>
    <h1>os-sm.84000.art</h1>
    <p>
      这个页面由同事自己的 GitHub 仓库发布。后续内容、设计、运营和回滚都在
      <strong>radar-oasis/os-sm-site</strong> 中完成。
    </p>
    <p>
      当你看到这个页面，说明 GitHub Pages 基础发布已经成功。下一步可以替换
      <code>docs/index.html</code>，把这里升级为新版正式网站。
    </p>
    <dl>
      <dt>Domain</dt>
      <dd>os-sm.84000.art</dd>
      <dt>Repository</dt>
      <dd>radar-oasis/os-sm-site</dd>
      <dt>Source</dt>
      <dd>main branch / docs folder</dd>
    </dl>
  </main>
</body>
</html>
